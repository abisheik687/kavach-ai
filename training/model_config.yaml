# ── Shared defaults ────────────────────────────────────────────────
shared:
  img_size:          224
  num_classes:       2
  batch_size:        32          # reduce to 16 if VRAM < 8 GB
  num_workers:       4
  epochs:            30
  warmup_epochs:     3           # freeze backbone, train head only
  early_stop_patience: 5         # epochs without val_auc improvement
  amp_enabled:       true        # mixed precision — auto-disabled on CPU
  grad_accumulation: 2           # effective batch = batch_size * grad_accumulation
  grad_clip:         1.0         # gradient clipping max norm
  seed:              42
  manifest_path:     training/dataset_manifest.csv
  checkpoint_dir:    training/checkpoints
  log_dir:           training/logs
  wandb_enabled:     false       # set to true + WANDB_API_KEY env var

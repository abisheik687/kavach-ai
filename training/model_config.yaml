# ── vit_primary: fine-tune HuggingFace ViT ─────────────────────────
vit_primary:
  model_name:        vit_primary
  backbone:          hf                # load from HuggingFace hub
  hf_model_id:       prithivMLmods/Deepfake-vs-Real-ViT
  freeze_strategy:   head_plus_last2   # unfreeze classifier + last 2 encoder blocks
  head_lr:           3.0e-4
  backbone_lr:       1.0e-5
  weight_decay:      0.01
  scheduler:         cosine_warmup
  label_smoothing:   0.1
  dropout:           0.1

# ── vit_secondary: fine-tune HuggingFace ViT ───────────────────────
vit_secondary:
  model_name:        vit_secondary
  backbone:          hf
  hf_model_id:       dima806/deepfake_vs_real_image_detection
  freeze_strategy:   head_plus_last1
  head_lr:           2.0e-4
  backbone_lr:       5.0e-6
  weight_decay:      0.01
  scheduler:         cosine_warmup
  label_smoothing:   0.05
  dropout:           0.0

# ── efficientnet_b4: full fine-tune from timm ImageNet ─────────────
efficientnet:
  model_name:        efficientnet_b4
  backbone:          timm
  timm_model_id:     efficientnet_b4
  pretrained:        true
  freeze_strategy:   staged           # warmup_epochs frozen, then full unfreeze
  head_lr:           1.0e-3
  backbone_lr:       1.0e-4
  weight_decay:      1.0e-4
  scheduler:         cosine_warmup
  label_smoothing:   0.1
  dropout:           0.3
  batch_size:        32

# ── xception: full fine-tune from timm ImageNet ─────────────────────
xception:
  model_name:        xception
  backbone:          timm
  timm_model_id:     xception
  pretrained:        true
  freeze_strategy:   staged
  head_lr:           1.0e-3
  backbone_lr:       5.0e-5
  weight_decay:      1.0e-4
  scheduler:         cosine_warmup
  label_smoothing:   0.1
  dropout:           0.3
  batch_size:        24              # Xception is memory-heavier

# ── convnext_base: recommended new addition ──────────────────────────
convnext:
  model_name:        convnext_base
  backbone:          timm
  timm_model_id:     convnext_base
  pretrained:        true
  pretrained_cfg:    imagenet22k_ft1k  # use 22k init for best transfer
  freeze_strategy:   staged
  head_lr:           5.0e-4
  backbone_lr:       5.0e-5
  weight_decay:      0.05
  scheduler:         cosine_warmup
  label_smoothing:   0.1
  dropout:           0.0
  batch_size:        32
# ── wav2vec2_audio: audio cloning detection ───────────────────────────
wav2vec2_audio:
  model_name:        wav2vec2_audio
  backbone:          hf
  hf_model_id:       facebook/wav2vec2-base-960h
  freeze_strategy:   staged
  head_lr:           1.0e-3
  backbone_lr:       1.0e-5
  weight_decay:      0.01
  scheduler:         cosine_warmup
  batch_size:        16
  img_size:          null               # Not used for audio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Run active backend smoke tests
        env:
          PYTHONPATH: backend
          ENABLE_REMOTE_MODEL_DOWNLOADS: "false"
        run: |
          pytest tests/active

      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontend

      - name: Build frontend
        run: |
          npm run build --prefix frontend
          
  build-docker:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Backend Image
        run: |
          docker build -t kavach-backend:latest -f backend/Dockerfile backend
          
      - name: Build Frontend Image
        run: |
          docker build -t kavach-frontend:latest -f frontend/Dockerfile frontend
